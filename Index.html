<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Memory Match Game</title>
  <style>
    :root{
      --bg1:#8fd3ff;
      --bg2:#d6f6ff;
      --panel:#ffffffdd;
      --text:#24324a;
      --accent:#ff7eb6;
      --accent2:#6dd5ff;
      --good:#5dd39e;
      --gold:#ffd166;
      --shadow:0 12px 30px rgba(36,50,74,.18);
      --radius:22px;
      --card-back-1:#7cc8ff;
      --card-back-2:#9df3ff;
      --card-size:min(12vw, 98px);
      --gap:10px;
      --flip-speed:.55s;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Trebuchet MS", "Comic Sans MS", "Segoe UI", system-ui, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, #ffffff88 0 9%, transparent 10%),
        radial-gradient(circle at 80% 15%, #ffffff77 0 7%, transparent 8%),
        radial-gradient(circle at 15% 85%, #ffffff55 0 8%, transparent 9%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow:hidden;
    }

    .screen{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      transition:.35s ease;
    }

    .hidden{
      opacity:0;
      pointer-events:none;
      transform:scale(.98);
    }

    .panel{
      width:min(1150px, 100%);
      max-height:100%;
      overflow:auto;
      background:var(--panel);
      backdrop-filter: blur(12px);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px;
      border:1px solid #ffffffaa;
    }

    .title{
      font-size:clamp(28px, 4vw, 54px);
      font-weight:900;
      text-align:center;
      margin:6px 0 4px;
      letter-spacing:.5px;
      color:#21314b;
      text-shadow:0 2px 0 #fff;
    }

    .subtitle{
      text-align:center;
      font-size:clamp(14px, 2vw, 20px);
      margin:0 0 18px;
      color:#50627d;
    }

    .menu-top{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#fff;
      padding:10px 14px;
      border-radius:999px;
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      font-weight:700;
      font-size:14px;
    }

    .themes{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap:14px;
      margin-top:10px;
    }

    .theme-btn{
      border:none;
      cursor:pointer;
      border-radius:24px;
      padding:18px 14px;
      min-height:118px;
      background:linear-gradient(180deg, #ffffff, #f5fbff);
      box-shadow:0 8px 18px rgba(27, 57, 87, .1);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-weight:800;
    }

    .theme-btn:hover,
    .theme-btn:focus-visible{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 14px 28px rgba(27, 57, 87, .18);
      outline:none;
      background:linear-gradient(180deg, #fff7fb, #eefbff);
    }

    .theme-emoji{
      font-size:42px;
      line-height:1;
      filter:drop-shadow(0 4px 4px rgba(0,0,0,.08));
    }

    .theme-name{
      font-size:17px;
    }

    .game-wrap{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
      width:100%;
    }

    .hud{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:10px;
    }

    .hud-box{
      background:#fff;
      border-radius:20px;
      padding:12px 14px;
      box-shadow:0 8px 16px rgba(0,0,0,.08);
      text-align:center;
      font-weight:800;
      min-height:74px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .hud-label{
      font-size:12px;
      color:#60708a;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:5px;
    }

    .hud-value{
      font-size:clamp(18px, 2.2vw, 28px);
      color:#24324a;
    }

    .button{
      border:none;
      border-radius:18px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:900;
      font-size:16px;
      color:#24324a;
      background:linear-gradient(180deg, #fff, #f2fbff);
      box-shadow:0 8px 18px rgba(0,0,0,.1);
      transition:.18s ease;
    }

    .button:hover,
    .button:focus-visible{
      transform:translateY(-2px);
      outline:none;
      box-shadow:0 12px 22px rgba(0,0,0,.14);
    }

    .primary{
      background:linear-gradient(180deg, #ffd2e8, #ffc0dc);
    }

    .secondary{
      background:linear-gradient(180deg, #d8f3ff, #c4ecff);
    }

    .board-shell{
      width:min(980px, 100%);
      background:linear-gradient(180deg, #ffffffcc, #f6fcffcc);
      padding:14px;
      border-radius:28px;
      box-shadow:0 14px 28px rgba(0,0,0,.1);
      border:1px solid #fff;
    }

    .board{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap:var(--gap);
      justify-items:center;
    }

    .card{
      width:100%;
      aspect-ratio: 1 / 1.18;
      perspective:1000px;
      cursor:pointer;
      border:none;
      background:transparent;
      padding:0;
      position:relative;
      transform:translateZ(0);
    }

    .card-inner{
      position:relative;
      width:100%;
      height:100%;
      transform-style:preserve-3d;
      transition:transform var(--flip-speed) cubic-bezier(.2,.75,.2,1);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner{
      transform:rotateY(180deg);
    }

    .card-face{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:20px;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      user-select:none;
      overflow:hidden;
    }

    .card-front{
      transform:rotateY(180deg);
      background:linear-gradient(180deg, #fffefb, #fff5dc);
      box-shadow:inset 0 0 0 2px #fff2b0, 0 8px 18px rgba(0,0,0,.12);
      font-size:clamp(28px, 4vw, 54px);
    }

    .card-back{
      background:
        radial-gradient(circle at 30% 30%, #ffffff88 0 8%, transparent 9%),
        radial-gradient(circle at 70% 65%, #ffffff55 0 10%, transparent 11%),
        linear-gradient(180deg, var(--card-back-1), var(--card-back-2));
      box-shadow:inset 0 0 0 2px #ffffff90, 0 8px 18px rgba(0,0,0,.12);
    }

    .back-icon{
      width:60%;
      height:60%;
      border-radius:18px;
      background:
        linear-gradient(135deg, #ffffffaa, #ffffff55);
      display:grid;
      place-items:center;
      font-size:clamp(22px, 3vw, 38px);
      color:#ffffff;
      font-weight:900;
      text-shadow:0 2px 6px rgba(0,0,0,.15);
      box-shadow:inset 0 0 0 2px #ffffff70;
    }

    .card:not(.flipped):not(.matched):hover .card-inner{
      transform:translateY(-2px) rotateZ(-.5deg);
    }

    .card.locked{
      pointer-events:none;
    }

    .card.matched{
      animation:matchPulse .75s ease;
    }

    .card.matched .card-front{
      background:linear-gradient(180deg, #fffef3, #dcffe8);
      box-shadow:
        inset 0 0 0 3px #9be7b8,
        0 0 0 8px rgba(93, 211, 158, .12),
        0 10px 22px rgba(51, 180, 124, .22);
    }

    .card.matched::after{
      content:"✨";
      position:absolute;
      inset:auto 6px 6px auto;
      font-size:20px;
      animation:sparkle 1.2s ease infinite;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
      pointer-events:none;
    }

    @keyframes matchPulse{
      0%{transform:scale(1)}
      20%{transform:scale(1.07)}
      45%{transform:scale(.98)}
      70%{transform:scale(1.04)}
      100%{transform:scale(1)}
    }

    @keyframes sparkle{
      0%,100%{transform:translateY(0) scale(1); opacity:.9}
      50%{transform:translateY(-5px) scale(1.2); opacity:1}
    }

    .win-overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(34, 49, 74, .28);
      backdrop-filter: blur(5px);
      opacity:0;
      pointer-events:none;
      transition:.28s ease;
      z-index:50;
    }

    .win-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .win-box{
      width:min(680px, calc(100% - 24px));
      background:linear-gradient(180deg, #fffef7, #ffffff);
      border-radius:30px;
      padding:28px 22px;
      text-align:center;
      box-shadow:0 18px 40px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .win-box::before,
    .win-box::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      background:#ffe9a8;
      filter:blur(40px);
      opacity:.45;
    }

    .win-box::before{left:-60px; top:-70px}
    .win-box::after{right:-50px; bottom:-70px}

    .win-title{
      position:relative;
      font-size:clamp(28px, 4vw, 52px);
      font-weight:1000;
      margin:0 0 8px;
    }

    .win-text{
      position:relative;
      font-size:clamp(16px, 2vw, 22px);
      margin:0 0 16px;
      color:#51637c;
      font-weight:700;
    }

    .win-stats{
      position:relative;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:10px;
      margin:16px 0 18px;
    }

    .win-stat{
      background:#fff;
      border-radius:18px;
      padding:12px;
      box-shadow:0 8px 16px rgba(0,0,0,.06);
      font-weight:900;
    }

    .confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:55;
    }

    .piece{
      position:absolute;
      width:12px;
      height:18px;
      border-radius:4px;
      opacity:.95;
      animation:fall linear forwards;
    }

    @keyframes fall{
      from{
        transform:translateY(-15vh) rotate(0deg);
      }
      to{
        transform:translateY(115vh) rotate(720deg);
      }
    }

    .footer-row{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      position:relative;
    }

    .tiny{
      font-size:12px;
      color:#71839d;
      text-align:center;
      margin-top:10px;
      font-weight:700;
    }

    @media (max-width:900px){
      .hud{grid-template-columns: repeat(2, 1fr)}
      .board{grid-template-columns: repeat(6, 1fr)}
    }

    @media (max-width:720px){
      :root{
        --gap:8px;
        --card-size:min(13vw, 78px);
      }
      .panel{padding:16px}
      .board{grid-template-columns: repeat(6, 1fr)}
      .board-shell{padding:10px}
      .hud{grid-template-columns: repeat(2, 1fr)}
      .win-stats{grid-template-columns:1fr}
      .card-face{border-radius:16px}
    }

    @media (max-width:520px){
      .board{grid-template-columns: repeat(5, 1fr)}
      .hud{grid-template-columns:1fr 1fr}
      .hud-box:last-child{grid-column:1/-1}
    }
  </style>
</head>
<body>
  <div id="menuScreen" class="screen">
    <div class="panel">
      <div class="title">🧠 Memory Match</div>
      <div class="subtitle">Pick a fun theme and match all the cards!</div>

      <div class="menu-top">
        <div class="badge">🎯 6 × 5 board</div>
        <div class="badge">💖 10 themes</div>
        <div class="badge">✨ Flip animations</div>
        <div class="badge">🏆 Match them all to win</div>
      </div>

      <div id="themesGrid" class="themes"></div>
      <div class="tiny">Tap any theme to start</div>
    </div>
  </div>

  <div id="gameScreen" class="screen hidden">
    <div class="game-wrap">
      <div class="hud">
        <div class="hud-box">
          <div class="hud-label">Theme</div>
          <div id="themeName" class="hud-value">Animals</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Moves</div>
          <div id="movesCount" class="hud-value">0</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Matches</div>
          <div id="matchesCount" class="hud-value">0 / 15</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Time</div>
          <div id="timeCount" class="hud-value">00:00</div>
        </div>
        <div class="hud-box">
          <div class="hud-label">Actions</div>
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
            <button id="restartBtn" class="button primary">Restart</button>
            <button id="menuBtn" class="button secondary">Menu</button>
          </div>
        </div>
      </div>

      <div class="board-shell">
        <div id="board" class="board"></div>
      </div>
    </div>
  </div>

  <div id="winOverlay" class="win-overlay">
    <div class="win-box">
      <div class="win-title">🎉 You Win! 🎉</div>
      <div class="win-text">Amazing memory work!</div>
      <div class="win-stats">
        <div class="win-stat">🧩 Theme<br><span id="winTheme">Animals</span></div>
        <div class="win-stat">👣 Moves<br><span id="winMoves">0</span></div>
        <div class="win-stat">⏱️ Time<br><span id="winTime">00:00</span></div>
      </div>
      <div class="footer-row">
        <button id="playAgainBtn" class="button primary">Play Again</button>
        <button id="newThemeBtn" class="button secondary">Choose Theme</button>
      </div>
    </div>
  </div>

  <div id="confetti" class="confetti"></div>

  <script>
    const THEMES = [
      { name: "Animals", icon: "🐶", cards: ["🐶","🐱","🐰","🦊","🐻","🐼","🦁","🐸","🐵","🐮","🐷","🐨","🐯","🐹","🦄"] },
      { name: "Fruits", icon: "🍎", cards: ["🍎","🍌","🍇","🍓","🍉","🍍","🥝","🍒","🍑","🍊","🥥","🍐","🫐","🥭","🍋"] },
      { name: "Vehicles", icon: "🚗", cards: ["🚗","🚕","🚌","🚓","🚑","🚒","🚜","🚲","🏍️","✈️","🚀","🚂","🚁","⛵","🚚"] },
      { name: "Sea World", icon: "🐠", cards: ["🐠","🐟","🐬","🐳","🦀","🦑","🐙","🦐","🪼","🐡","🦞","🦭","🐚","🌊","⭐"] },
      { name: "Space", icon: "🚀", cards: ["🌞","🌙","⭐","🪐","🌍","☄️","🚀","🛰️","👨‍🚀","🌌","🌟","🌠","🛸","🔭","☀️"] },
      { name: "Dinosaurs", icon: "🦖", cards: ["🦖","🦕","🥚","🌋","🪨","🌿","🦴","🌴","🍃","☄️","🌎","🦎","🌞","🐊","🍀"] },
      { name: "Insects", icon: "🦋", cards: ["🦋","🐞","🐝","🪲","🕷️","🦂","🐜","🪰","🪱","🦗","🌼","🍃","🌸","🍀","🌻"] },
      { name: "Weather", icon: "☀️", cards: ["☀️","🌤️","⛅","🌧️","⛈️","🌩️","🌨️","❄️","🌈","💨","☁️","🌪️","🌙","☔","🌊"] },
      { name: "Farm", icon: "🚜", cards: ["🐮","🐔","🐷","🐴","🐑","🦆","🐐","🚜","🌽","🥕","🍎","🌾","🏡","🪵","🥚"] },
      { name: "Yummy Food", icon: "🍕", cards: ["🍕","🍔","🌭","🍟","🍩","🧁","🍪","🍦","🍿","🥨","🌮","🍓","🥞","🧀","🍉"] }
    ];

    const menuScreen = document.getElementById("menuScreen");
    const gameScreen = document.getElementById("gameScreen");
    const themesGrid = document.getElementById("themesGrid");
    const board = document.getElementById("board");
    const themeNameEl = document.getElementById("themeName");
    const movesCountEl = document.getElementById("movesCount");
    const matchesCountEl = document.getElementById("matchesCount");
    const timeCountEl = document.getElementById("timeCount");
    const winOverlay = document.getElementById("winOverlay");
    const winTheme = document.getElementById("winTheme");
    const winMoves = document.getElementById("winMoves");
    const winTime = document.getElementById("winTime");
    const confetti = document.getElementById("confetti");

    const restartBtn = document.getElementById("restartBtn");
    const menuBtn = document.getElementById("menuBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const newThemeBtn = document.getElementById("newThemeBtn");

    let currentTheme = THEMES[0];
    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matches = 0;
    let timer = null;
    let seconds = 0;
    let gameStarted = false;

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function formatTime(sec){
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function startTimer(){
      if(timer) return;
      timer = setInterval(() => {
        seconds++;
        timeCountEl.textContent = formatTime(seconds);
      }, 1000);
    }

    function stopTimer(){
      clearInterval(timer);
      timer = null;
    }

    function resetStats(){
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      matches = 0;
      seconds = 0;
      gameStarted = false;
      stopTimer();
      movesCountEl.textContent = "0";
      matchesCountEl.textContent = "0 / 15";
      timeCountEl.textContent = "00:00";
    }

    function buildThemes(){
      themesGrid.innerHTML = "";
      THEMES.forEach((theme, index) => {
        const btn = document.createElement("button");
        btn.className = "theme-btn";
        btn.innerHTML = `
          <div class="theme-emoji">${theme.icon}</div>
          <div class="theme-name">${theme.name}</div>
        `;
        btn.addEventListener("click", () => startGame(index));
        themesGrid.appendChild(btn);
      });
    }

    function makeBoardData(theme){
      const pairItems = [...theme.cards, ...theme.cards];
      return shuffle(pairItems).map((symbol, i) => ({
        id: i + "_" + Math.random().toString(36).slice(2,8),
        symbol,
        matched: false
      }));
    }

    function renderBoard(){
      board.innerHTML = "";
      cards.forEach(cardData => {
        const card = document.createElement("button");
        card.className = "card";
        card.setAttribute("data-id", cardData.id);
        card.setAttribute("data-symbol", cardData.symbol);
        card.setAttribute("aria-label", "Memory card");
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back">
              <div class="back-icon">★</div>
            </div>
            <div class="card-face card-front">${cardData.symbol}</div>
          </div>
        `;
        card.addEventListener("click", onCardClick);
        board.appendChild(card);
      });
    }

    function showScreen(screen){
      [menuScreen, gameScreen].forEach(s => s.classList.add("hidden"));
      screen.classList.remove("hidden");
    }

    function startGame(themeIndex){
      currentTheme = THEMES[themeIndex];
      themeNameEl.textContent = currentTheme.name;
      resetStats();
      cards = makeBoardData(currentTheme);
      renderBoard();
      showScreen(gameScreen);
      winOverlay.classList.remove("show");
      clearConfetti();
    }

    function onCardClick(e){
      const card = e.currentTarget;
      if(lockBoard) return;
      if(card === firstCard) return;
      if(card.classList.contains("flipped") || card.classList.contains("matched")) return;

      if(!gameStarted){
        gameStarted = true;
        startTimer();
      }

      flipCard(card);

      if(!firstCard){
        firstCard = card;
        return;
      }

      secondCard = card;
      moves++;
      movesCountEl.textContent = moves;

      checkMatch();
    }

    function flipCard(card){
      card.classList.add("flipped");
    }

    function unflipCards(){
      lockBoard = true;
      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        resetTurn();
      }, 850);
    }

    function markMatched(){
      lockBoard = true;
      setTimeout(() => {
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matches++;
        matchesCountEl.textContent = `${matches} / 15`;
        resetTurn();
        if(matches === 15){
          finishGame();
        }
      }, 240);
    }

    function checkMatch(){
      const isMatch = firstCard.dataset.symbol === secondCard.dataset.symbol;
      isMatch ? markMatched() : unflipCards();
    }

    function resetTurn(){
      [firstCard, secondCard] = [null, null];
      lockBoard = false;
    }

    function finishGame(){
      stopTimer();
      winTheme.textContent = currentTheme.name;
      winMoves.textContent = moves;
      winTime.textContent = formatTime(seconds);
      winOverlay.classList.add("show");
      launchConfetti();
    }

    function clearConfetti(){
      confetti.innerHTML = "";
    }

    function launchConfetti(){
      clearConfetti();
      const colors = ["#ff7eb6","#ffd166","#5dd39e","#6dd5ff","#c792ff","#ff9f68"];
      for(let i=0;i<140;i++){
        const piece = document.createElement("div");
        piece.className = "piece";
        piece.style.left = Math.random() * 100 + "vw";
        piece.style.top = (-10 - Math.random() * 30) + "vh";
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (3 + Math.random() * 3) + "s";
        piece.style.animationDelay = (Math.random() * 0.9) + "s";
        piece.style.transform = `translateY(-20vh) rotate(${Math.random()*360}deg)`;
        confetti.appendChild(piece);
      }
      setTimeout(clearConfetti, 7000);
    }

    restartBtn.addEventListener("click", () => {
      const index = THEMES.findIndex(t => t.name === currentTheme.name);
      startGame(index);
    });

    menuBtn.addEventListener("click", () => {
      stopTimer();
      showScreen(menuScreen);
      winOverlay.classList.remove("show");
      clearConfetti();
    });

    playAgainBtn.addEventListener("click", () => {
      const index = THEMES.findIndex(t => t.name === currentTheme.name);
      startGame(index);
    });

    newThemeBtn.addEventListener("click", () => {
      winOverlay.classList.remove("show");
      stopTimer();
      showScreen(menuScreen);
      clearConfetti();
    });

    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && !gameScreen.classList.contains("hidden")){
        winOverlay.classList.remove("show");
      }
    });

    buildThemes();
  </script>
</body>
</html>
